<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 聊天室</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .status {
            padding: 10px 20px;
            background: #f8f9fa;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.connected {
            background: #4caf50;
        }

        .status-dot.disconnected {
            background: #f44336;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #fafbfc;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.system {
            text-align: center;
            color: #999;
            font-size: 13px;
        }

        .message.user {
            display: flex;
            flex-direction: column;
        }

        .message-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .message-content {
            background: white;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            max-width: 80%;
            word-wrap: break-word;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .login-form {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .login-form.hidden {
            display: none;
        }

        .message-form {
            display: flex;
            gap: 10px;
        }

        .message-form.hidden {
            display: none;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 WebSocket 聊天室</h1>
        </div>

        <div class="status">
            <span>
                <span class="status-dot disconnected" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </span>
            <span id="onlineCount">在线: 0</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message system">欢迎来到聊天室！</div>
        </div>

        <div class="input-area">
            <div class="login-form" id="loginForm">
                <input type="text" id="nickname" placeholder="输入昵称..." maxlength="20">
                <button onclick="login()">加入聊天室</button>
            </div>

            <div class="message-form hidden" id="messageForm">
                <input type="text" id="messageInput" placeholder="输入消息..." maxlength="500">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isLoggedIn = false;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const chatMessages = document.getElementById('chatMessages');
        const loginForm = document.getElementById('loginForm');
        const messageForm = document.getElementById('messageForm');
        const nicknameInput = document.getElementById('nickname');
        const messageInput = document.getElementById('messageInput');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname;
            ws = new WebSocket(`${protocol}//${host}:8080`);

            ws.onopen = () => {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接';
                addSystemMessage('已连接到服务器');
            };

            ws.onclose = () => {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '未连接';
                addSystemMessage('与服务器断开连接');
                isLoggedIn = false;
                showLoginForm();
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addSystemMessage('连接出错');
            };
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'system':
                    addSystemMessage(data.message);
                    break;
                case 'message':
                    addUserMessage(data.from, data.message, data.time);
                    break;
                case 'pong':
                    console.log('Pong received:', data.time);
                    break;
            }
        }

        function addSystemMessage(message) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = message;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function addUserMessage(from, message, time) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="message-info">${from} · ${time}</div>
                <div class="message-content">${escapeHtml(message)}</div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showLoginForm() {
            loginForm.classList.remove('hidden');
            messageForm.classList.add('hidden');
        }

        function showMessageForm() {
            loginForm.classList.add('hidden');
            messageForm.classList.remove('hidden');
            messageInput.focus();
        }

        function login() {
            const nickname = nicknameInput.value.trim();
            if (!nickname) {
                alert('请输入昵称');
                return;
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'login',
                    nickname: nickname
                }));
                isLoggedIn = true;
                showMessageForm();
            }
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) {
                return;
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'message',
                    message: message
                }));
                messageInput.value = '';
            }
        }

        nicknameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        connect();
    </script>
</body>
</html>
